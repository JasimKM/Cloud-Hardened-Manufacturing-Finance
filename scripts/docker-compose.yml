version: '3.8'

services:
  scada-sim:
    build: .
    image: manufacturing-vault/scada-sim:v2.0
    container_name: mfg-scada-simulator
    ports:
      - "502:502"
    restart: unless-stopped
    command: python /app/scada_simulator.py
    volumes:
      - ./scada_simulator.py:/app/scada_simulator.py
    networks:
      - mfg-net

networks:
  mfg-net:
    driver: bridge
