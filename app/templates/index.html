{% extends "base.html" %}
{% block content %}
<div class="text-center mb-5">
    <h2 class="mb-2">Reactor Core: Secure Ingestion</h2>
    <div class="stat-label">VAULT STATUS: <span class="stat-value">STANDBY</span></div>
</div>

<form action="/encrypt" method="POST" enctype="multipart/form-data" id="ingestion-form">
    <div class="reactor-core clickable" onclick="document.getElementById('source-input').click()">
        <div class="crucible-portal" id="portal">
            <div class="portal-iris">
                <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="var(--vault-blue)" stroke-width="1.5" style="opacity: 0.6;">
                    <path d="M12 2v20M2 12h20M12 2a10 10 0 1 0 0 20 10 10 0 1 0 0-20z"/>
                    <circle cx="12" cy="12" r="3" fill="var(--security-green)"/>
                </svg>
            </div>
        </div>
        <div class="mt-4 text-center">
            <div class="tech-label" id="status-text">INITIATE SECURE INGESTION</div>
            <div class="stat-label opacity-50" id="file-name">NO ASSET LOADED</div>
        </div>
        <input type="file" name="file" id="source-input" style="display: none;" onchange="handleFile(this)">
    </div>

    <div class="mt-5 w-100" style="max-width: 500px;">
        <label class="tech-label">SECURITY KEY (ENCRYPTION PASSPHRASE)</label>
        <input type="password" name="encryption_password" class="form-control" placeholder="Enter High-Entropy Key" required>
        
        <button type="submit" class="btn btn-vault w-100 mt-4 py-3" style="letter-spacing: 4px;">EXECUTE ENCRYPTION</button>
    </div>
</form>

<!-- Facility Shift Button -->
<div class="mt-4 pt-3 border-top border-secondary opacity-25 w-100 text-center" style="max-width: 500px;">
    <a href="/decrypt" class="btn btn-sm text-info tech-label" style="text-decoration: none; font-size: 11px;">
        >> SHIFT TO DECRYPTION FACILITY <<
    </a>
</div>

<script>
    function handleFile(input) {
        const portal = document.getElementById('portal');
        const statusText = document.getElementById('status-text');
        const fileName = document.getElementById('file-name');
        
        if (input.files.length > 0) {
            portal.parentElement.classList.add('crucible-active');
            statusText.textContent = "ASSET VALIDATED";
            statusText.style.color = "var(--security-green)";
            fileName.textContent = input.files[0].name.toUpperCase();
        }
    }
</script>
{% endblock %}
